<!DOCTYPE html>
<html>
<head>
    <title>Assignments</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="table-container">
    <h1>Assignments</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Course ID</th>
            <th>Title</th>
            <th>Due Date</th>
        </tr>

        {% for a in assignments %}
        <tr>
            <td>{{ a[0] }}</td>
            <td>{{ a[1] }}</td>
            <td>{{ a[2] }}</td>
            <td>{{ a[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
