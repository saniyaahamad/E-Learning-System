<!DOCTYPE html>
<html>
<head>
    <title>Subjects</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="table-container">
    <h1>Subjects</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Subject Name</th>
            <th>Course ID</th>
        </tr>

        {% for s in subjects %}
        <tr>
            <td>{{ s[0] }}</td>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
